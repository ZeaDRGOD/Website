            <form id="minecraftRankForm" enctype="multipart/form-data">

                </select><br><br><br>

                <br><br><br>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="/js/ReportForm.js"></script>
    <script>
        let url = "theheavenly.net";
        $(document).ready(() => {
            $.getJSON("https://api.mcsrvstat.us/1/" + url, (status) => {
                if (status.debug.ping) {
                    $("#status").append("ONLINE");
                    $("#status2").append("PLAYER");
                    $("#players_num").append(status.players.online)
                    $("#players_num2").append(status.players.online)
                } else {
                    $("#status").append("OFFLINE");
                    $("#status2").append("OFFLINE");
                    $("#players_num").append("0");
                    $("#players_num2").append("0");
                }
                $("body").fadeIn(2000);
            });
        });
        function copyServerIP() {
            // Server IP to copy
            var serverIP = "theheavenly.net:19132"; // Replace with your server IP

            // Create a temporary input element
            var tempInput = document.createElement("input");
            tempInput.value = serverIP;
            document.body.appendChild(tempInput);

            // Select the text in the input element
            tempInput.select();
            tempInput.setSelectionRange(0, 99999); // For mobile devices

            // Copy the selected text to the clipboard
            document.execCommand("copy");

            // Remove the temporary input element
            document.body.removeChild(tempInput);

            // Show alert message
            alert("Server IP copied to clipboard!");
        }
    </script>
