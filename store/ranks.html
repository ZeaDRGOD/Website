    <script>
        function checkSubmissionLimit() {

            var currentDate = new Date().toLocaleDateString();
            var lastSubmissionDate = localStorage.getItem('lastSubmissionDate');

            if (!lastSubmissionDate || lastSubmissionDate !== currentDate) {
                localStorage.setItem('submissionCount', 0);
                localStorage.setItem('lastSubmissionDate', currentDate);
            }

            var submissionCount = parseInt(localStorage.getItem('submissionCount')) || 0;

            if (submissionCount < 3) {
                localStorage.setItem('submissionCount', submissionCount + 1);
                const submitButton = document.getElementById('submit');
                submitButton.disabled = true;
                submitButton.value = 'Loading...';
                return true;
            } else {
                const submitButton = document.getElementById('submit');
                submitButton.disabled = true;
                alert('Your form will be reviewed within 24 hours.');
                return submitButton.value = 'Try again later!', false;
            }
        }

        document.getElementById('minecraftRankForm').addEventListener('submit', function(event) {
            event.preventDefault();

            if (!checkSubmissionLimit()) {
                return;
            }

            var BuyDate = new Date().toLocaleDateString();
            var formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('platform', document.getElementById('platform').value);
            formData.append('server', document.getElementById('server').value);
            formData.append('rank', document.getElementById('rank').value);
            formData.append('image', document.getElementById('image').files[0]);

            var webhookURL = 'https://discord.com/api/webhooks/1230565352610467882/_Q5P0cUAxJL--gZgnthwHdbYc7vlgzP6VR780kaiOtVt-xz1DpMaehujq4UyD7WNBjfC';

            sendImage(formData.get('image'))
                .then(function(imageUrl) {
                    var embedData = {
                        title: 'New Minecraft Rank Submission',
                        description: 'Username: ' + formData.get('name') + '\n' +
                                    'Game: ' + formData.get('platform') + '\n' +
                                    'Server: ' + formData.get('server') + '\n' +
                                    'Rank: ' + formData.get('rank') + '\n' +
                                    'Date: ' + BuyDate,
                        color: 16777215, // White color
                        image: {
                            url: imageUrl
                        }
                    };

                    var payload = {
                        embeds: [embedData],
                        content: '>>> ## 🎉**Here! New form ke apply**🎉' + '\n\n' + '@everyone' + '\n\n' + '🎨 check merl mer ke buy rank or apply ko' + '\n' + '💰 <@1050399202162782339> check mer bank mer see lui ot ber see dak rank oy ke tv!' + '\n' + '```/lp user ' + formData.get('name') + ' parent addtemp ' + formData.get('rank') + ' 30d```'
                        
                    };

                    return fetch(webhookURL, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(payload)
                    });
                })
                .then(response => {
                    if (response.ok) {
                        location.href = 'thankyou'
                    } else {
                        location.herf = 'error'
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                });
        });

        function sendImage(imageFile) {
            var formData = new FormData();
            formData.append('image', imageFile);

            var webhookURL = 'https://discord.com/api/webhooks/1230565352610467882/_Q5P0cUAxJL--gZgnthwHdbYc7vlgzP6VR780kaiOtVt-xz1DpMaehujq4UyD7WNBjfC';

            return fetch(webhookURL, {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (response.ok) {
                    return response.json();
                } else {
                    throw new Error('Failed to send image to Discord webhook');
                }
            })
            .then(data => {
                return data.url;
            })
            .catch(error => {
                console.error('Error:', error);
            });
        }
        let url = "theheavenly.net";
        $(document).ready(() => {
            $.getJSON("https://api.mcsrvstat.us/1/" + url, (status) => {
                if (status.debug.ping) {
                    $("#status").append("ONLINE");
                    $("#status2").append("PLAYER");
                    $("#players_num").append(status.players.online)
                    $("#players_num2").append(status.players.online)
                } else {
                    $("#status").append("OFFLINE");
                    $("#status2").append("OFFLINE");
                    $("#players_num").append("0");
                    $("#players_num2").append("0");
                }
                $("body").fadeIn(2000);
            });
        });
        function copyServerIP() {
            // Server IP to copy
            var serverIP = "theheavenly.net:19132"; // Replace with your server IP

            // Create a temporary input element
            var tempInput = document.createElement("input");
            tempInput.value = serverIP;
            document.body.appendChild(tempInput);

            // Select the text in the input element
            tempInput.select();
            tempInput.setSelectionRange(0, 99999); // For mobile devices

            // Copy the selected text to the clipboard
            document.execCommand("copy");

            // Remove the temporary input element
            document.body.removeChild(tempInput);

            // Show alert message
            alert("Server IP copied to clipboard!");
        }
